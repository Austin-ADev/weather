<!DOCTYPE html>
<html>
<head>
  <title>Weather Dashboard</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<canvas id="sky"></canvas>

<div class="weather-box">
  <input id="citySearch" placeholder="Search city...">

  <div class="city-name">Loading...</div>
  <div class="temp">--°F</div>
  <div class="condition">--</div>

  <div class="details">
    <div class="detail-row"><span>Humidity</span><span id="humidity">--</span></div>
    <div class="detail-row"><span>Wind</span><span id="wind">--</span></div>
    <div class="detail-row"><span>Feels Like</span><span id="feels">--</span></div>
  </div>
</div>

<script type="module" src="app.js"></script>
</body>
</html>
