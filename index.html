<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Weather</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="icon" type="image/png" sizes="512x512" href="favicon.png"/>   

  <style>
    .hidden-ui {
      display: none !important;
    }
  </style>
</head>

<body>
  <canvas id="sky"></canvas>

  <!-- ALL UI -->
  <div id="ui" class="app-container">

    <!-- TOP BAR -->
    <div class="top-bar">
      <div class="search-wrapper">
        <span class="search-icon">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path fill="currentColor"
              d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79L19 20.5 20.5 19 15.5 14zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z" />
          </svg>
        </span>

        <input id="citySearch" type="text" placeholder="Search city..." autocomplete="off" />
        <div id="searchResults" class="search-results"></div>
        <div id="recentSearches" class="search-results"></div>
      </div>

      <button id="unitToggle" class="unit-btn">Metric</button>
    </div>

    <!-- FAVORITES -->
    <div class="favorites-bar">
      <div id="favoritesList" class="favorites-list"></div>
      <button id="favoriteToggle" class="fav-btn">☆</button>
    </div>

    <!-- MAIN CONTENT -->
    <div class="content-area">
      <div class="weather-card">

        <!-- HEADER -->
        <div class="header-block">
          <div id="cityName" class="city-name">—</div>
          <div id="localtime" class="local-time">—</div>
        </div>

        <!-- CURRENT -->
        <div class="current-main">
          <div id="temp" class="temp">--°F</div>
          <div id="condition" class="condition">—</div>
        </div>

        <!-- DETAILS -->
        <div class="details">
          <div>Humidity: <span id="humidity">--%</span></div>
          <div>Wind: <span id="wind">-- mph</span></div>
          <div>Feels Like: <span id="feels">--°F</span></div>
        </div>

        <!-- HOURLY FORECAST -->
        <div class="forecast-panel">
          <div class="panel-title">Next 24 Hours</div>

          <div id="hourlyScroll">
            <div id="hourlyTooltip" class="hourly-tooltip"></div>
            <div id="hourlyInner">
              <canvas id="hourlyChart"></canvas>
              <div id="forecast"></div>
            </div>
          </div>
        </div>

        <!-- DAILY FORECAST -->
        <div class="forecast-panel forecast-panel-daily">
          <div class="panel-title">Next 7 Days</div>
          <div id="dailyForecast"></div>
        </div>
      </div>

      <!-- RADAR -->
      <iframe
        id="radarFrame"
        class="radar-frame"
        src=""
        loading="lazy"
        title="Weather Radar"
      ></iframe>
    </div>
  </div>

  <!-- UI TOGGLE -->
  <script>
    function toggleUI() {
      document.getElementById("ui").classList.toggle("hidden-ui");
    }

    window.addEventListener("keydown", e => {
      if (e.key.toLowerCase() === "h") toggleUI();
    });

    // Horizontal scroll for hourly forecast using mouse wheel
    window.addEventListener("DOMContentLoaded", () => {
      const hourlyScroll = document.getElementById("hourlyScroll");

      if (hourlyScroll) {
        hourlyScroll.addEventListener("wheel", (e) => {
          if (e.deltaY !== 0) {
            e.preventDefault();
            hourlyScroll.scrollLeft += e.deltaY * 0.7;
          }
        }, { passive: false });
      }
    });
  </script>

  <script src="app.js"></script>
</body>
</html>
