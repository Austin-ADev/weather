<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Weather</title>
  <link rel="stylesheet" href="styles.css" />
</head>

<body>
  <canvas id="sky"></canvas>

  <div id="panel">
    <div id="topBar">
      <input id="citySearch" placeholder="Search city…" autocomplete="off" />
      <button id="detectLocation">📍</button>
      <button id="unitToggle" class="unit-toggle">US</button>
    </div>

    <div id="searchResults"></div>

    <div id="current">
      <div id="cityName">--</div>
      <div id="localtime">--:--</div>
      <div id="moonLabel">Moon</div>
      <div id="temp">--°F</div>
      <div id="condition">--</div>

      <div class="row">
        <span>Humidity:</span><span id="humidity">--%</span>
      </div>
      <div class="row">
        <span>Wind:</span><span id="wind">-- mph</span>
      </div>
      <div class="row">
        <span>Feels Like:</span><span id="feels">--°F</span>
      </div>
    </div>

    <div id="hourlyToggle" class="sectionToggle">Next 24 Hours</div>
    <div id="forecast"></div>

    <div class="sectionToggle">Next 7 Days</div>
    <div id="dailyForecast"></div>

    <div class="sectionToggle">Radar</div>
    <iframe id="radarFrame"></iframe>
  </div>

  <script type="module" src="app.js?v=1000000"></script>
</body>
</html>
