<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Weather</title>
  <link rel="stylesheet" href="styles.css" />
</head>

<body>

  <!-- SHADER BACKGROUND -->
  <canvas id="sky"></canvas>

  <!-- MAIN APP -->
  <div class="app-container">

    <!-- TOP BAR -->
    <div class="top-bar">

      <div class="search-wrapper">
        <span class="search-icon">
          <svg width="18" height="18" viewBox="0 0 24 24">
            <circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="2" fill="none"/>
            <line x1="16" y1="16" x2="22" y2="22" stroke="currentColor" stroke-width="2"/>
          </svg>
        </span>

        <input id="citySearch" type="text" placeholder="Search city..." autocomplete="off" />

        <div id="searchResults" class="search-results"></div>
        <div id="recentSearches" class="search-results"></div>
      </div>

      <button id="unitToggle" class="unit-btn">US</button>
    </div>

    <!-- FAVORITES -->
    <div class="favorites-bar">
      <div id="favoritesList" class="favorites-list"></div>
      <button id="favoriteToggle" class="fav-btn">☆</button>
    </div>

    <!-- MAIN CONTENT AREA -->
    <div class="content-area">

      <!-- LEFT: WEATHER CARD -->
      <div class="weather-card">

        <div class="header-block">
          <div id="cityName" class="city-name">--</div>
          <div id="localtime" class="local-time">--:--</div>
        </div>

        <div class="current-main">
          <div id="temp" class="temp">--°F</div>
          <div id="condition" class="condition">--</div>
        </div>

        <div class="details">
          <div>Humidity: <span id="humidity">--%</span></div>
          <div>Wind: <span id="wind">-- mph</span></div>
          <div>Feels Like: <span id="feels">--°F</span></div>
        </div>

        <div class="toggle-buttons">
          <button id="hourlyToggle" class="tab-btn active">Next 24 Hours</button>
          <button id="dailyToggle" class="tab-btn">Next 7 Days</button>
        </div>

        <div id="forecast" class="forecast-panel"></div>
        <div id="dailyForecast" class="forecast-panel scrollable"></div>

      </div>

      <!-- RIGHT: RADAR ALWAYS VISIBLE -->
      <iframe
        id="radarFrame"
        class="radar-frame"
        loading="lazy">
      </iframe>

    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
