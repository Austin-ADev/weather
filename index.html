<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Weather v2</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <canvas id="sky"></canvas>

  <div class="panel">
    <div class="top-row">
      <input id="citySearch" placeholder="Search city..." autocomplete="off" />
      <button id="unitToggle">US</button>
    </div>
    <div id="searchResults" class="search-results"></div>

    <div class="current">
      <div class="city" id="cityName">--</div>
      <div class="time" id="localtime">--:--</div>
      <div class="condition" id="condition">--</div>
      <div class="temp" id="temp">--°F</div>
      <div class="meta">
        <span>Humidity: <span id="humidity">--%</span></span>
        <span>Wind: <span id="wind">-- mph</span></span>
        <span>Feels Like: <span id="feels">--°F</span></span>
        <span>Moon: <span id="moonLabel">--</span></span>
      </div>
    </div>

    <div class="buttons">
      <button id="hourlyToggle">Next 24 Hours</button>
      <button id="dailyToggle">Next 7 Days</button>
      <button id="radarToggle">Radar</button>
    </div>

    <div id="forecast" class="forecast"></div>
    <div id="dailyForecast" class="forecast"></div>
    <iframe id="radarFrame" class="radar" style="display:none;"></iframe>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
